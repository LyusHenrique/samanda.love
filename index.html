<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Quiz</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* animated anime background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at center,#1b2735,#090a0f 70%);
animation:bgmove 30s linear infinite;
z-index:-2;
}

@keyframes bgmove{
from{transform:translate(-10%,-10%)}
to{transform:translate(-30%,-30%)}
}

.card{
background:rgba(0,0,0,0.75);
padding:25px;
border-radius:18px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

h1{margin-top:0}

img{
width:220px;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
transition:transform .6s;
}

.flip{transform:rotateY(180deg)}

button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
background:#ff4b6e;
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.05);
background:#ff2d55;
}

.progress{
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:100%;
width:0%;
background:#ff4b6e;
transition:.4s;
}

/* cinematic overlay */
.cinema{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
animation:fadein 2s;
}

@keyframes fadein{from{opacity:0}to{opacity:1}}

/* anime opening text */
.opening{
font-size:42px;
letter-spacing:3px;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{transform:scale(0);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* petals */
.petal{
position:fixed;
width:10px;
height:10px;
background:pink;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* hearts */
.heart{
position:fixed;
font-size:22px;
color:#ff4b6e;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-200px);opacity:0}
}

/* ring box */
.ringbox{
width:120px;
height:80px;
background:#111;
border-radius:10px;
position:relative;
margin:20px auto;
animation:openbox 1.5s ease forwards;
}

.ringbox:before{
content:"";
position:absolute;
top:-40px;
left:0;
width:120px;
height:40px;
background:#222;
border-radius:10px 10px 0 0;
transform-origin:bottom;
animation:lid 1.5s forwards;
}

.ring{
font-size:60px;
margin-top:10px;
animation:ringpop 1.5s ease;
}

@keyframes lid{
0%{transform:rotateX(0)}
100%{transform:rotateX(-120deg)}
}

@keyframes openbox{0%{transform:scale(.7)}100%{transform:scale(1)}}

@keyframes ringpop{
0%{transform:scale(0)}
70%{transform:scale(1.4)}
100%{transform:scale(1)}
}

</style>
</head>
<body>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="app" class="card"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const musica=document.getElementById("musica");

window.addEventListener("load",()=>{
musica.volume=0.6;
const p=musica.play();
if(p!==undefined){p.catch(()=>{document.body.addEventListener("click",()=>musica.play(),{once:true})})}
});

/* sakura petals */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=5+Math.random()*10+"s";
document.body.appendChild(p);
}

const app=document.getElementById("app");

/* anime opening */
function telaInicial(){
app.innerHTML=`
<div class='opening'>🎮 ANIME QUIZ</div>
<p>Veja se você realmente conhece personagens de anime</p>
<button onclick="iniciar()">Iniciar Jogo</button>
`;
}

const perguntas=[
{img:'seiya.jpg',o:['Seiya','Ikki','Shiryu','Hyoga']},
{img:'naruto.jpg',o:['Naruto','Sasuke','Gaara','Minato']},
{img:'goku.jpg',o:['Vegeta','Goku','Gohan','Bardock']},
{img:'luffy.jpg',o:['Zoro','Ace','Luffy','Sabo']},
{img:'ichigo.jpg',o:['Ichigo','Renji','Uryu','Aizen']},
{img:'tanjiro.jpg',o:['Zenitsu','Tanjiro','Inosuke','Giyu']},
{img:'levi.jpg',o:['Levi','Eren','Erwin','Jean']},
{img:'saitama.jpg',o:['Genos','Saitama','Garou','Bang']},
{img:'asta.jpg',o:['Yuno','Asta','Noelle','Yami']},
{img:'natsu.jpg',o:['Gray','Natsu','Laxus','Gajeel']},
{img:'deku.jpg',o:['Bakugo','Todoroki','Deku','All Might']},
{img:'edward.jpg',o:['Alphonse','Roy','Edward','Scar']},
{img:'killua.jpg',o:['Killua','Gon','Hisoka','Illumi']},
{img:'kaneki.jpg',o:['Touka','Kaneki','Arima','Uta']},
{img:'meliodas.jpg',o:['Ban','Meliodas','Escanor','King']},
{img:'yusuke.jpg',o:['Hiei','Kurama','Yusuke','Toguro']},
{img:'kakashi.jpg',o:['Kakashi','Obito','Itachi','Jiraiya']},
{img:'gojo.jpg',o:['Gojo','Geto','Sukuna','Megumi']},
{img:'eren.jpg',o:['Eren','Armin','Reiner','Levi']},
{img:'vegeta.jpg',o:['Vegeta','Goku','Broly','Trunks']}
];

let atual=0;

function iniciar(){
app.innerHTML=`
<div class='progress'><div class='progress-bar' id='progress'></div></div>
<img id='img'>
<div id='ops'></div>
`;
carregar();
}

function carregar(){

const img=document.getElementById("img");
const ops=document.getElementById("ops");
const progress=document.getElementById("progress");

progress.style.width=(atual/perguntas.length*100)+"%";

let p=perguntas[atual];

img.classList.add("flip");
setTimeout(()=>{
img.src="imagens/"+p.img;
img.classList.remove("flip");
},300);

ops.innerHTML="";

p.o.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=responder;
ops.appendChild(b);
});

}

function responder(){
atual++;
if(atual<perguntas.length)carregar();
else fimQuiz();
}

function fimQuiz(){
app.innerHTML=`
<h2>se vc chegou ate aqui é porque foi aprovada , deseja continuar?</h2>
<button onclick='continuar()'>Sim</button>
<button onclick='this.innerText="Sim"'>Não</button>
`;
}

function continuar(){

const cinema=document.createElement("div");
cinema.className="cinema";
cinema.innerHTML=`
<h2>Uma última coisa...</h2>
<p>Leia com atenção</p>
<button onclick='textoPedido()'>Continuar</button>
`;

document.body.appendChild(cinema);
}

function textoPedido(){

const c=document.querySelector(".cinema");

c.innerHTML=`
<p style='max-width:500px;font-size:20px'><div style='max-width:90vw;font-size:clamp(16px,4.5vw,20px);line-height:1.6;padding:10px 5px;margin:0 auto;word-break:break-word'>
Sei que eu não fui a melhor pessoa com você.<br><br>
Mas eu quero consertar tudo de verdade e estou aqui pedindo uma última chance para estarmos juntos.<br><br>
E será a última vez que vou precisar pedir isso, porque quero fazer dar certo.<br><br>
Talvez eu não consiga apagar o passado…<br>
mas posso melhorar o seu presente<br>
e construir um futuro ao seu lado.
</div>
</div></p>
<button onclick='pedido()'>Continuar</button>
`;
}

function pedido(){

const c=document.querySelector(".cinema");

c.innerHTML=`
<h1>Samanda minha ruiva maravilhosa esplendida</h1>
<h2>aceita namorar comigo?</h2>
<button onclick='aceitou()'>Sim</button>
<button onclick='aceitou()'>Com certeza</button>
`;
}

function coracoes(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},300);
}

function fogos(){
const end=Date.now()+9000;
(function frame(){
confetti({particleCount:10,spread:80,origin:{x:Math.random(),y:Math.random()-0.2}});
if(Date.now()<end)requestAnimationFrame(frame);
})();
}

function aceitou(){

fogos();
coracoes();

const c=document.querySelector(".cinema");

c.innerHTML=`
<div class='ringbox'></div>
<div class='ring'>💍</div>
<h1>Ela aceitou ❤️</h1>
<p>é um pedido serio para namorarmos claro que nao vai anular que eu vou pedir pessoalmente também, mas achei essa maneira criativa de tentar fazer isso</p>
`;
}


telaInicial();

</script>

</body>
</html>
